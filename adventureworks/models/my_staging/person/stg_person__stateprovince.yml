models:
  - name: stg_person__stateprovince
    description: "Staging model for state and province reference data linked to countries and territories."
    columns:
      - name: state_province_id
        data_type: integer
        description: "Primary key. Unique identifier for each state or province."
        data_tests:
          - unique
          - not_null

      - name: country_code
        data_type: varchar
        description: "Foreign key to countryregion. The country or region this state or province belongs to."
        data_tests:
          - not_null

      - name: state
        data_type: varchar
        description: "Full name of the state or province."

      - name: territory_id
        data_type: integer
        description: "Reference to the sales territory associated with this state or province."

      - name: state_code
        data_type: varchar
        description: "Short code identifying the state or province."