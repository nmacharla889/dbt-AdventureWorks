models:
  - name: stg_person__person
    description: "Staging model for individual people including customers, employees and contacts."
    columns:
      - name: business_entity_id
        data_type: integer
        description: "Primary key. Unique identifier for each person, shared with the BusinessEntity root table."
        data_tests:
          - unique
          - not_null

      - name: customer_name
        data_type: varchar
        description: "Full name of the person derived from first, middle and last name fields."

      - name: person_type
        data_type: varchar
        description: "Code indicating the role of the person, e.g. IN for individual, EM for employee."
