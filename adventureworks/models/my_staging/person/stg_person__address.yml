models:
  - name: stg_person__address
    description: "Staging model for physical address data used across customers, employees and vendors."
    columns:
      - name: address_id
        data_type: integer
        description: "Primary key. Unique identifier for each address."
        data_tests:
          - unique
          - not_null

      - name: line_1
        data_type: varchar
        description: "First line of the street address."

      - name: line_2
        data_type: varchar
        description: "Second line of the street address. Optional."

      - name: city
        data_type: varchar
        description: "City name for the address."

      - name: state_province_id
        data_type: integer
        description: "Foreign key to stateprovince. The state or province this address belongs to."
        data_tests:
          - not_null

      - name: postcode
        data_type: varchar
        description: "Postal code for the address."