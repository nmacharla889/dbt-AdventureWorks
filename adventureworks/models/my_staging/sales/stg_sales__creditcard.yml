models:
  - name: stg_sales__creditcard
    description: "Staging model for credit card records linked to sales orders."
    columns:
      - name: credit_card_id
        data_type: integer
        description: "Primary key. Unique identifier for each credit card record."
        data_tests:
          - unique
          - not_null

      - name: card_type
        data_type: varchar
        description: "Type of credit card, e.g. Visa, MasterCard."