models:
  - name: stg_sales__store
    description: "Staging model for store accounts that purchase as business customers."
    columns:
      - name: business_entity_id
        data_type: integer
        description: "Primary key. Unique identifier for each store, shared with the BusinessEntity root table."
        data_tests:
          - unique
          - not_null

      - name: store_name
        data_type: varchar
        description: "Trading name of the store."

      - name: sales_person_id
        data_type: integer
        description: "Foreign key to salesperson. The sales person assigned to manage this store account."
        data_tests:
          - not_null